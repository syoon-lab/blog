<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>syoon-lab blog</title>
    <meta name="description" content="개발 기록, AI 활용 사례, 업무 자동화 경험을 모아두는 공개용 기록 저장소입니다." />
    <meta property="og:title" content="syoon-lab blog" />
    <meta property="og:description" content="개발 기록, AI 활용 사례, 업무 자동화 경험을 모아두는 공개용 기록 저장소입니다." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://syoon-lab.github.io/blog/" />
    <style>
      :root {
        color-scheme: light;
        --ink: #172033;
        --muted: #5d6678;
        --line: #dde3ec;
        --paper: #ffffff;
        --bg: #f6f3ee;
        --accent: #0a3d62;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--ink);
        font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR",
          "Segoe UI", sans-serif;
        line-height: 1.7;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .page {
        max-width: 820px;
        margin: 0 auto;
        padding: 56px 22px 72px;
      }

      header {
        margin-bottom: 28px;
      }

      .eyebrow {
        margin: 0 0 8px;
        color: var(--accent);
        font-size: 0.92rem;
        font-weight: 800;
      }

      h1 {
        margin: 0;
        font-size: clamp(2.2rem, 7vw, 3.4rem);
        line-height: 1.12;
        letter-spacing: 0;
      }

      .lead {
        max-width: 640px;
        margin: 16px 0 0;
        color: var(--muted);
        font-size: 1.02rem;
        word-break: keep-all;
      }

      .post-card {
        display: block;
        background: var(--paper);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 26px;
        box-shadow: 0 18px 45px rgba(23, 32, 51, 0.08);
        transition: transform 0.16s ease, box-shadow 0.16s ease;
      }

      .post-card:hover {
        transform: translateY(-2px);
        box-shadow: 0 22px 55px rgba(23, 32, 51, 0.12);
      }

      .meta {
        margin: 0 0 8px;
        color: var(--accent);
        font-size: 0.86rem;
        font-weight: 800;
      }

      h2 {
        margin: 0 0 12px;
        font-size: clamp(1.45rem, 5vw, 2rem);
        line-height: 1.25;
        letter-spacing: 0;
      }

      .summary {
        margin: 0;
        color: var(--muted);
        word-break: keep-all;
      }
    </style>
  </head>
  <body>
    <main class="page">
      <header>
        <p class="eyebrow">syoon-lab</p>
        <h1>blog</h1>
        <p class="lead">개발 기록, AI 활용 사례, 업무 자동화 경험을 모아두는 공개용 기록 저장소입니다.</p>
      </header>

      <a class="post-card" href="./posts/fishery-regulation-nifs/">
        <p class="meta">2026. 7. 1. · AI 챔피언 고급과정 실습 사례</p>
        <h2>민원 전화에서 시작한 얼렁뚱땅 앱 개발기</h2>
        <p class="summary">수산자원 금어기·금지체장 조회 앱을 만들며 현장의 반복 업무를 작게 줄여본 기록입니다.</p>
      </a>
    </main>
  </body>
</html>
